services:
  dummy_web:
    build:
      context: ./dummy-web
    networks:
      - waf_net

  waf:
    build:
      context: ./waf_proxy
    depends_on:
      - dummy_web
    networks:
      - waf_net

  admin_panel:
    build:
      context: ./waf_proxy
    command: [ "python", "admin_dashboard.py" ]
    depends_on:
      - waf
    networks:
      - waf_net

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
      - "5005:5005"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - waf
    networks:
      - waf_net

networks:
  waf_net:
    driver: bridge
