worker_processes auto;

events {
    worker_connections 8192;
    multi_accept on;
}

http {
    
    limit_req_zone  $binary_remote_addr zone=general:10m    rate=1000r/s;
    limit_req_zone  $binary_remote_addr zone=login_api:10m  rate=20r/s;
    limit_req_zone  $binary_remote_addr zone=search_api:10m rate=500r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;


    map $request_uri $waf_prescreen_block {
        default  0;

        # ── XSS: URL-encoded < สำหรับ script / img / svg tags ──────────────────
        "~*(%3[Cc]script|%3[Cc]img|%3[Cc]svg|%3[Cc]iframe|%3[Cc]body|%3[Cc]details)"  1;

        # ── XSS: HTML entity encoded ──────────────────────────────────────────
        "~*(&#0*60;|&#[xX]0*3[cC];|%26%230*60%3[Bb]|%26lt%3[Bb])"  1;

        # ── SQLi: UNION SELECT ─────────────────────────────────────────────────
        "~*(union.{0,30}select)"  1;

        # ── SQLi: Hex-encoded strings ────────────────────────────────────────────
        "~*(0x[0-9a-fA-F]{3,})"  1;

        # ── SQLi: Double URL-encoded quote / percent ─────────────────────────────
        "~*(%2527|%2525)"  1;

        # ── XSS: Event handlers ──────────────────────────────────────────────────
        "~*(onerror\s*=|onload\s*=|onfocus\s*=|onclick\s*=|ontoggle\s*=|onstart\s*=|onplay\s*=)"  1;

        # ── SQLi: Quote + OR tautology pattern ──────────────────────────────────
        #   %27 = '    จับ ' OR / ' or
        "~*(%27.{0,5}or)"  1;

        # ── SQLi: SQL Comment bypass (/***/) ────────────────────────────────────
        "~*(%2[Ff]%2[Aa]%2[Aa]%2[Ff])"  1;

        # ── XSS: javascript: URI ─────────────────────────────────────────────────
        "~*(javascript%3[Aa]|javascript:)"  1;
    }

    # ─── Upstream Pool ──────────────────────────────────────────────────────────
    upstream waf_backend {
        server waf:5000;
        keepalive 128;
        keepalive_requests 500;
        keepalive_timeout  60s;
    }

    # ─── HTTP → HTTPS Redirect ──────────────────────────────────────────────────
    server {
        listen 80;
        server_name localhost;
        return 301 https://$host$request_uri;
    }

    # ─── Main WAF Server ────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name localhost;
        server_tokens off;

        ssl_certificate     /etc/nginx/ssl/waf.crt;
        ssl_certificate_key /etc/nginx/ssl/waf.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        add_header X-Content-Type-Options  "nosniff"        always;
        add_header X-Frame-Options         "DENY"           always;
        add_header X-XSS-Protection        "1; mode=block"  always;

        location / {
            limit_req  zone=general burst=2000 nodelay;
            limit_conn conn_limit 1000;

            limit_req_status  429;
            limit_conn_status 429;

            if ($waf_prescreen_block) {
               return 403 "Blocked by WAF pre-screen";
            }

            proxy_pass http://waf_backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            proxy_set_header X-From-WAF "true";

            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_connect_timeout 3s;
            proxy_send_timeout    10s;
            proxy_read_timeout    10s;
        }

        location /login {
            limit_req  zone=login_api burst=50 nodelay;
            limit_conn conn_limit 200;
            limit_req_status  429;
            limit_conn_status 429;

            if ($waf_prescreen_block) {
                return 403 "Blocked by WAF pre-screen";
            }

            proxy_pass http://waf_backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-From-WAF        "true";
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_connect_timeout 3s;
            proxy_send_timeout    10s;
            proxy_read_timeout    10s;
        }

        location /search {
            limit_req  zone=search_api burst=1000 nodelay;
            limit_conn conn_limit 500;
            limit_req_status  429;
            limit_conn_status 429;

            if ($waf_prescreen_block) {
                return 403 "Blocked by WAF pre-screen";
            }

            proxy_pass http://waf_backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-From-WAF        "true";
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_connect_timeout 3s;
            proxy_send_timeout    10s;
            proxy_read_timeout    10s;
        }
    }

    # ─── Admin Panel ────────────────────────────────────────────────────────────
    server {
        listen 5005 ssl;
        server_name localhost;
        server_tokens off;

        ssl_certificate     /etc/nginx/ssl/waf.crt;
        ssl_certificate_key /etc/nginx/ssl/waf.key;

        error_page 497 https://$host:5005$request_uri;

        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        location / {
            proxy_pass http://admin_panel:5005;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}
